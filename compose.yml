services:
  metarate:
    build:
      context: .
      dockerfile: metarate/Dockerfile
    image: metarate
    container_name: metarate
    restart: always
    command: "gunicorn -c gunicorn.py metarate.wsgi"
    env_file:
      - .env
    links:
      - "postgres:${DATABASE_HOST}"
    networks:
      - backend
    volumes:
      - ./metarate:/app/www/metarate
    ports:
      - "8000:8000"
    depends_on:
      - postgres
  nginx:
    image: nginx:latest
    container_name: nginx-server
    restart: always
    networks:
      - backend
    expose:
      - 8088
    ports:
      - "80:8088"
    volumes:
      - ./metarate/static:/app/www/metarate/static
      - ./metarate/media:/app/www/metarate/media
      - ./metarate/logs:/app/www/metarate/logs
      - ./nginx:/etc/nginx/conf.d
    depends_on:
      - metarate


  postgres:
    image: postgres:17-alpine
    container_name: psgr
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USERNAME}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres-data:



